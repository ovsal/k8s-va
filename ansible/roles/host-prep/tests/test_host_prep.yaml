---
# Smoke-тесты роли host-prep.
# Запускаются отдельно после применения роли, чтобы убедиться что нода готова.
#
# Использование:
#   cd ansible && ansible-playbook -i inventory/prod/hosts.yaml roles/host-prep/tests/test_host_prep.yaml
#
# Каждая задача завершается ошибкой (failed_when) если нода не в нужном состоянии.
# ansible-playbook вернёт exit code 2 при провале — удобно для CI.

- name: Verify host-prep role
  hosts: all
  gather_facts: true
  tasks:

    - name: swap is off
      # swapon --show возвращает пустой stdout если swap выключен.
      # Kubernetes отказывается стартовать при включённом swap.
      command: swapon --show
      register: swap_out
      changed_when: false
      failed_when: swap_out.stdout != ""

    - name: ip_forward is enabled
      # Без ip_forward=1 пакеты между подами не маршрутизируются.
      command: sysctl -n net.ipv4.ip_forward
      register: ipfwd
      changed_when: false
      failed_when: ipfwd.stdout | trim != "1"

    - name: containerd is running
      # containerd должен быть active до запуска kubespray —
      # Kubespray использует его как container runtime.
      systemd:
        name: containerd
      register: containerd_svc
      failed_when: containerd_svc.status.ActiveState != "active"

    - name: chrony is running
      # NTP-синхронизация критична для etcd и TLS.
      systemd:
        name: chronyd
      register: chrony_svc
      failed_when: chrony_svc.status.ActiveState != "active"
