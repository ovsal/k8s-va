[defaults]
inventory          = inventory/prod/hosts.yaml
roles_path         = roles:kubespray/roles
collections_paths  = /opt/homebrew/lib/python3.14/site-packages/ansible_collections:~/.ansible/collections:/usr/share/ansible/collections
host_key_checking  = False
stdout_callback    = yaml
callbacks_enabled  = timer, profile_tasks
forks              = 20
become             = true
become_method      = sudo
gathering          = smart
fact_caching       = jsonfile
fact_caching_connection = /tmp/ansible_facts_cache
fact_caching_timeout = 3600

[ssh_connection]
pipelining         = True
ssh_args           = -o ControlMaster=auto -o ControlPersist=60s -o StrictHostKeyChecking=no -i /Users/ai_ovsyannikov/.ssh/id_rsa_ansible2
