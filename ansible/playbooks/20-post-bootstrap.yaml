---
- name: Fetch kubeconfig from first control-plane
  hosts: "{{ groups['kube_control_plane'][0] }}"
  gather_facts: false
  vars:
    kubeconfig_dest: "{{ lookup('env','HOME') }}/.kube/config-k8s-va"
  tasks:
    - name: Read admin.conf
      slurp:
        src: /etc/kubernetes/admin.conf
      become: true
      register: kubeconfig_raw

    - name: Ensure local .kube dir exists
      file:
        path: "{{ lookup('env','HOME') }}/.kube"
        state: directory
        mode: '0700'
      delegate_to: localhost
      become: false

    - name: Write kubeconfig locally
      copy:
        content: "{{ kubeconfig_raw.content | b64decode }}"
        dest: "{{ kubeconfig_dest }}"
        mode: '0600'
      delegate_to: localhost
      become: false

    - name: Replace internal API server address with VIP in kubeconfig
      replace:
        path: "{{ kubeconfig_dest }}"
        regexp: 'server: https://.*:6443'
        replace: "server: https://{{ loadbalancer_apiserver.address }}:6443"
      delegate_to: localhost
      become: false

    - name: Set KUBECONFIG in shell profile
      lineinfile:
        path: "{{ lookup('env','HOME') }}/.zshrc"
        line: "export KUBECONFIG={{ kubeconfig_dest }}"
        state: present
      delegate_to: localhost
      become: false

- name: Smoke test cluster
  hosts: localhost
  connection: local
  gather_facts: false
  environment:
    KUBECONFIG: "{{ lookup('env','HOME') }}/.kube/config-k8s-va"
  tasks:
    - name: Get nodes
      command: kubectl get nodes -o wide
      register: nodes_out
      changed_when: false

    - name: Print nodes
      debug:
        var: nodes_out.stdout_lines

    - name: Verify all nodes Ready
      command: >
        kubectl get nodes -o jsonpath='{.items[*].status.conditions[-1].type}'
      register: node_status
      changed_when: false
      failed_when: "'NotReady' in node_status.stdout"

    - name: Check etcd cluster health
      command: >
        kubectl -n kube-system exec etcd-cp-1 -- etcdctl
        --endpoints=https://127.0.0.1:2379
        --cacert=/etc/kubernetes/pki/etcd/ca.crt
        --cert=/etc/kubernetes/pki/etcd/peer.crt
        --key=/etc/kubernetes/pki/etcd/peer.key
        endpoint health --cluster
      changed_when: false
      ignore_errors: true
