---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kube-prometheus-stack
  namespace: argocd
spec:
  project: platform
  sources:
    - repoURL: https://github.com/ovsal/k8s-va.git
      targetRevision: main
      ref: values
    - repoURL: https://prometheus-community.github.io/helm-charts
      chart: kube-prometheus-stack
      targetRevision: 61.7.1
      helm:
        valueFiles:
          - $values/platform/apps/observability/prometheus-values.yaml
    - repoURL: https://github.com/ovsal/k8s-va.git
      targetRevision: main
      path: platform/apps/observability
      directory:
        include: 'grafana-externalsecret.yaml'
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true   # требуется для больших CRD
