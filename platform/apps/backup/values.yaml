configuration:
  backupStorageLocation:
    - name: default
      provider: aws
      bucket: k8s-velero-backup
      config:
        region: us-east-1
        s3Url: http://minio.minio.svc.cluster.local:9000
        s3ForcePathStyle: "true"
        insecureSkipTLSVerify: "true"

  volumeSnapshotLocation:
    - name: default
      provider: aws
      config:
        region: us-east-1

credentials:
  useSecret: true
  # S3 credentials поставляются через ExternalSecret (secret velero-credentials)
  existingSecret: velero-credentials

initContainers:
  - name: velero-plugin-for-aws
    image: velero/velero-plugin-for-aws:v1.10.0
    volumeMounts:
      - mountPath: /target
        name: plugins

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

metrics:
  enabled: true
  serviceMonitor:
    enabled: false   # включить после установки Prometheus

# Отключить pre-install hook для CRD upgrade — ArgoCD сам применяет CRDs
upgradeCRDs: false
