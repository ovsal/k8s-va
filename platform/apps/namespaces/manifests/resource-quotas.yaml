---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: compute-quota
  namespace: va-dev
spec:
  hard:
    requests.cpu: "8"
    requests.memory: 16Gi
    limits.cpu: "16"
    limits.memory: 32Gi
    persistentvolumeclaims: "20"
    services.loadbalancers: "0"
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: compute-quota
  namespace: va-stage
spec:
  hard:
    requests.cpu: "16"
    requests.memory: 32Gi
    limits.cpu: "32"
    limits.memory: 64Gi
    persistentvolumeclaims: "20"
    services.loadbalancers: "0"
