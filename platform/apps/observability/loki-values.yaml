loki:
  auth_enabled: false
  commonConfig:
    replication_factor: 1
  storage:
    type: filesystem   # заменить на s3 если есть S3 объектное хранилище
  schemaConfig:
    configs:
      - from: 2024-01-01
        store: tsdb
        object_store: filesystem
        schema: v13
        index:
          prefix: loki_index_
          period: 24h

deploymentMode: SingleBinary

singleBinary:
  replicas: 1
  persistence:
    storageClass: longhorn
    size: 50Gi
  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
          - matchExpressions:
              - key: node-pool
                operator: In
                values:
                  - storage

# SingleBinary mode: все scalable-компоненты в 0
read:
  replicas: 0
write:
  replicas: 0
backend:
  replicas: 0

# В SingleBinary с filesystem storage кеш не нужен
chunksCache:
  enabled: false
resultsCache:
  enabled: false

# Grafana datasource будет добавлен через sidecar в kube-prometheus-stack
gateway:
  enabled: false
